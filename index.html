<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Pjes Luani</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0d1117;
  --card:#161b22;
  --red:#e63946;
  --text:#e6edf3;
}

body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  background:var(--card);
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
  border:1px solid #333;
}

input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:8px;
  border:1px solid #333;
  background:#000;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:var(--red);
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.error{
  color:red;
  margin-top:10px;
  display:none;
}

/* APP */
#app{
  display:none;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  border:1px solid #333;
}

.price{
  color:var(--red);
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>HYRJE</h2>
    <input 
      type="password" 
      id="pw" 
      placeholder="Fjalëkalimi"
      onkeydown="if(event.key==='Enter') login()"
    >
    <button onclick="login()">HYR</button>
    <div class="error" id="err">Fjalëkalimi gabim!</div>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
  <h2>Auto Pjes Luani</h2>
  <button onclick="logout()">Dil</button>
</div>

<input type="text" placeholder="Kërko..." oninput="search(this.value)">

<br><br>

<button onclick="addPart()">+ Shto Pjesë</button>

<br><br>

<div class="grid" id="grid"></div>

</div>

<script>

// DB
let DB = JSON.parse(localStorage.getItem("apl") || '{"pw":"1234","parts":[]}');

function save(){
  localStorage.setItem("apl", JSON.stringify(DB));
}

// LOGIN
function login(){
  const val = document.getElementById("pw").value;
  const err = document.getElementById("err");

  if(val === DB.pw){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  }else{
    err.style.display="block";
  }
}

// LOGOUT
function logout(){
  location.reload();
}

// ADD PART
function addPart(){
  const name = prompt("Emri i pjesës:");
  if(!name) return;

  const price = prompt("Çmimi:");

  DB.parts.push({
    name,
    price,
    date:new Date().toLocaleString()
  });

  save();
  render();
}

// RENDER
function render(list){
  const grid = document.getElementById("grid");
  const data = list || DB.parts;

  grid.innerHTML="";

  if(data.length === 0){
    grid.innerHTML="<p>Nuk ka pjesë.</p>";
    return;
  }

  data.forEach((p,i)=>{
    grid.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <div class="price">€ ${p.price || "-"}</div>
        <small>${p.date}</small>
        <br><br>
        <button onclick="del(${i})">Fshi</button>
      </div>
    `;
  });
}

// DELETE
function del(i){
  if(!confirm("A je i sigurt?")) return;

  DB.parts.splice(i,1);
  save();
  render();
}

// SEARCH
function search(q){
  q = q.toLowerCase();

  const filtered = DB.parts.filter(p =>
    p.name.toLowerCase().includes(q)
  );

  render(filtered);
}

// INIT
document.getElementById("pw").focus();

</script>

</body>
</html>
