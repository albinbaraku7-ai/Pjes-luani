<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Pjes Luani</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔴 FILL THIS */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);
const auth = getAuth(app);

const partsRef = ref(db, "parts");

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadData();
  } catch {
    alert("Login gabim");
  }
};

/* UPLOAD FOTO */
async function upload(file){
  const r = sRef(storage, "img/" + Date.now() + file.name);
  await uploadBytes(r, file);
  return await getDownloadURL(r);
}

/* ADD */
window.addPart = async () => {
  const name = document.getElementById("name").value;
  const file = document.getElementById("file").files[0];

  let photo = "";
  if(file) photo = await upload(file);

  push(partsRef, { name, photo });
};

/* DELETE */
window.del = (id) => {
  remove(ref(db, "parts/" + id));
};

/* REALTIME */
function loadData(){
  onValue(partsRef, snap => {
    const data = snap.val() || {};
    const box = document.getElementById("list");
    box.innerHTML = "";

    Object.entries(data).forEach(([id,p])=>{
      box.innerHTML += `
        <div class="card">
          <img src="${p.photo}" />
          <div>
            <b>${p.name}</b>
            <button onclick="del('${id}')">Fshi</button>
          </div>
        </div>
      `;
    });
  });
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  width:300px;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#ff1e1e;
  color:#fff;
  font-weight:bold;
  border:none;
  border-radius:8px;
}

#app{
  display:none;
  padding:20px;
}

h1{
  color:#ff1e1e;
}

.card{
  background:#1c1c1c;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #ff1e1e;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="login">
  <div class="box">
    <h2>LOGIN</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Hyr</button>
  </div>
</div>

<div id="app">
  <h1>Auto Pjes Luani</h1>

  <input id="name" placeholder="Emri i pjesës">
  <input type="file" id="file">
  <button onclick="addPart()">Shto</button>

  <div id="list"></div>
</div>

</body>
</html>
