<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luani Auto Pjes</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #1a1a1a, #000);
    color: white;
}

header {
    background: linear-gradient(90deg, #8b0000, #ff1a1a);
    padding: 25px;
    text-align: center;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 3px;
}

.container {
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 48px;
    color: #ff1a1a;
}

.box {
    margin-top: 30px;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    display: inline-block;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

input {
    padding: 12px;
    width: 250px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
}

.btn {
    background: #ff1a1a;
    color: white;
    padding: 12px 30px;
    border: none;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
}

.btn:hover {
    background: white;
    color: #ff1a1a;
}

small {
    display: block;
    margin-top: 10px;
    color: #ccc;
}
</style>
</head>

<body>

<header>
LUANI AUTO PJES
</header>

<div class="container">

<h1>Qasja në sistem</h1>

<div class="box">

    <input type="text" id="user" placeholder="Username"><br>
    <input type="password" id="pass" placeholder="Password"><br>

    <button class="btn" onclick="login()">HYR</button>

    <p id="msg"></p>

    <hr style="margin:20px 0; border:1px solid #333;">

    <h3>Ndrysho passwordin</h3>

    <input type="password" id="newpass" placeholder="New password"><br>
    <button class="btn" onclick="changePass()">Ruaj</button>

    <small>Password default është: 1234</small>

</div>

</div>

<script>

// vendos password default nëse nuk ekziston
if(localStorage.getItem("pass") === null){
    localStorage.setItem("pass", "1234");
}

function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;
    let savedPass = localStorage.getItem("pass");

    if(user === "admin" && pass === savedPass){
        document.getElementById("msg").innerHTML = "✔ Qasje e lejuar";
        document.getElementById("msg").style.color = "lime";
    } else {
        document.getElementById("msg").innerHTML = "✖ Gabim të dhënat";
        document.getElementById("msg").style.color = "red";
    }
}

function changePass(){
    let newpass = document.getElementById("newpass").value;

    if(newpass.length < 3){
        alert("Password shumë i shkurtër!");
        return;
    }

    localStorage.setItem("pass", newpass);
    alert("Passwordi u ndryshua me sukses!");
}
</script>

</body>
</html>
