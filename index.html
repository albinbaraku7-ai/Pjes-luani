    <div class="fg"><label>Lloji i Veturës</label><input type="text" id="pCar" placeholder="Audi A6, BMW 320i, Mercedes C300..."></div>
    <div class="fg"><label>Viti i Prodhimit</label><input type="number" id="pYear" placeholder="2018" min="1970" max="2030"></div>
    <div class="fg"><label>Emri i Pjesës</label><input type="text" id="pName" placeholder="Kapela e Timonit, Branika, Hauba..."></div>
    <div class="fg">
      <label>Gjendja e Pjesës</label>
      <select id="pCond">
        <option value="">— Zgjidh gjendjen —</option>
        <option>E Re</option><option>Si e Re</option><option>Shumë Mirë</option>
        <option>Mirë</option><option>Mesatare</option><option>Për Riparim</option>
      </select>
    </div>
    <div class="fg">
      <label>Çmimi i Shitjes <span style="color:var(--wh4)">(€)</span></label>
      <div class="price-w">
        <span class="price-sym">€</span>
        <input type="number" id="pPrice" class="price-i" placeholder="0.00" step="0.01">
      </div>
    </div>
    <div class="fg">
      <label>Kosto e Blerjes <span style="color:var(--wh4)">(€)</span></label>
      <div class="price-w">
        <span class="price-sym">€</span>
        <input type="number" id="pCost" class="price-i" placeholder="0.00" step="0.01">
      </div>
    </div>
    <div class="fg">
      <label>Sasia <span style="color:var(--wh4)">(copë)</span></label>
      <input type="number" id="pQty" placeholder="1" min="1" step="1" value="1">
    </div>
    <div class="fg">
      <label>Vendndodhja e Pjesës</label>
      <input type="text" id="pLoc" placeholder="p.sh. Raft A-3, Depot Kryesore, Dyqani...">
    </div>
    <div class="fg">
      <label>Foto</label>
      <div class="upl" onclick="document.getElementById('ph').click()">
        <div class="upl-ico">📷</div>
        <p>Kliko për të ngarkuar foto</p>
        <img class="upl-prev" id="phPrev">
        <input type="file" id="ph" accept="image/*" style="display:none" onchange="loadImg(event)">
      </div>
    </div>
    <div class="mo-acts">
      <button class="mo-cancel" onclick="closeMo()">Anulo</button>
      <button class="mo-save" onclick="saveP()">Ruaj Pjesën</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="closeLB()">
  <button class="lb-x" onclick="closeLB()">✕</button>
  <img id="lbImg" alt="" onclick="event.stopPropagation()">
</div>

<!-- CONFIRM -->
<div class="cf" id="cf">
  <div class="cf-box">
    <div class="cf-ico">🗑</div>
    <div class="cf-title">A je i sigurt?</div>
    <div class="cf-sub">A je i sigurt që don me fshi këtë pjesë? Ky veprim nuk mund të kthehet mbrapsht.</div>
    <div class="cf-btns">
      <button class="cf-no"  onclick="closeCF()">Jo</button>
      <button class="cf-yes" id="cfY">Po, Fshi</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let DB   = JSON.parse(localStorage.getItem('apl_wr2') || '{"parts":[],"pw":"luani123"}');
let editP = null, photo = null, cfCb = null;

const es  = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hi  = (s,q) => es(s).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
const fmtD= iso => {
  if (!iso) return '';
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const condC = c => ({
  'E Re':'#ffffff','Si e Re':'#d0d0d0','Shumë Mirë':'#4ade80',
  'Mirë':'#22d3ee','Mesatare':'#fbbf24','Për Riparim':'#e8192c'
}[c] || '#888');

function saveLoc() { localStorage.setItem('apl_wr2', JSON.stringify(DB)); }

function updateStats() {
  document.getElementById('stP').textContent = DB.parts.length;
  document.getElementById('stN').textContent = DB.parts.filter(p => p.cond==='E Re'||p.cond==='Si e Re').length;
}

// ══════════════════════════════════════
// FIREBASE INIT
// ══════════════════════════════════════
function initFB() {
  const fb = window._fb;
  const bar = document.getElementById('syncBar');

  if (!fb || !fb.useFirebase) {
    bar.innerHTML = '⬤ &nbsp;Modalitet lokal — vetëm kjo pajisje sheh ndryshimet · <em>Konfiguro Firebase tek Cilësimet</em>';
    bar.classList.remove('live');
    return;
  }

  // Real-time listener — fires whenever ANY user adds/edits/deletes
  fb.onValue(fb.dbRef, snap => {
    const val = snap.val() || {};
    DB.parts = Object.entries(val).map(([id, v]) => ({...v, _id: id}));
    saveLoc();
    updateStats();
    renderParts();
    bar.innerHTML = '<em>⬤</em> &nbsp;Live — ndryshimet shfaqen menjëherë te të gjithë';
    bar.classList.add('live');
  });
}

// ── WRITE OPS ──
function fbPush(part) {
  const fb = window._fb;
  if (fb && fb.useFirebase) {
    const r = fb.push(fb.dbRef); fb.set(r, part);
    // onValue will re-render automatically
  } else {
    DB.parts.push(part); saveLoc(); updateStats(); renderParts();
    notif('✓ Pjesa u shtua');
  }
}
function fbUpdate(id, part) {
  const fb = window._fb;
  if (fb && fb.useFirebase && id) {
    const r = fb.ref(fb.database, 'autopjes/parts/' + id); fb.set(r, part);
  } else {
    DB.parts[editP] = part; saveLoc(); updateStats(); renderParts();
    notif('✓ Pjesa u ndryshua');
  }
}
function fbRemove(id, li) {
  const fb = window._fb;
  if (fb && fb.useFirebase && id) {
    const r = fb.ref(fb.database, 'autopjes/parts/' + id); fb.remove(r);
  } else {
    DB.parts.splice(li, 1); saveLoc(); updateStats(); renderParts();
    notif('Pjesa u fshi', 'er');
  }
}

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
function doLogin() {
  const v = document.getElementById('pwIn').value;
  if (v === DB.pw) {
    const lp = document.getElementById('LP'); lp.style.opacity = '0';
    setTimeout(() => {
      lp.style.display = 'none';
      document.getElementById('APP').style.display = 'block';
      initFB(); renderParts(); updateStats();
    }, 700);
  } else {
    const e = document.getElementById('lpErr'); e.classList.add('show');
    document.getElementById('pwIn').value = '';
    setTimeout(() => e.classList.remove('show'), 2600);
  }
}
function doLogout() {
  document.getElementById('APP').style.display = 'none';
  const lp = document.getElementById('LP'); lp.style.display = 'flex'; lp.style.opacity = '1';
  document.getElementById('pwIn').value = '';
}
function changePw() {
  const c = document.getElementById('pwCur').value,
        n = document.getElementById('pwNew').value,
        f = document.getElementById('pwCf').value;
  const ok = document.getElementById('pwOk'), er = document.getElementById('pwEr');
  ok.classList.remove('show'); er.classList.remove('show');
  if (c !== DB.pw)  { er.textContent = 'Fjalëkalimi aktual gabim';        er.classList.add('show'); return; }
  if (n.length < 4) { er.textContent = 'Minimumi 4 karaktere';            er.classList.add('show'); return; }
  if (n !== f)      { er.textContent = 'Fjalëkalimet nuk përputhen';      er.classList.add('show'); return; }
  DB.pw = n; saveLoc(); ok.classList.add('show');
  ['pwCur','pwNew','pwCf'].forEach(id => document.getElementById(id).value = '');
  setTimeout(() => ok.classList.remove('show'), 3500);
}

// ══════════════════════════════════════
// NAV
// ══════════════════════════════════════
function showPg(name, btn) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('on'));
  const map = { home:'pgHome', parts:'pgParts', settings:'pgSettings' };
  document.getElementById(map[name]).classList.add('on');
  if (btn) btn.classList.add('on');
  if (name === 'parts') { document.getElementById('ppQ').value = ''; renderParts(); }
}
function goParts() { showPg('parts', document.getElementById('nParts')); }

// ══════════════════════════════════════
// HOME SEARCH
// ══════════════════════════════════════
function hsearch(q) {
  const res = document.getElementById('sRes'), clr = document.getElementById('sClr');
  clr.style.display = q.length > 0 ? 'block' : 'none';
  if (!q.trim()) { res.classList.remove('open'); return; }
  const ql = q.toLowerCase();
  const hits = DB.parts.filter(p =>
    p.name?.toLowerCase().includes(ql) || p.car?.toLowerCase().includes(ql) ||
    p.cond?.toLowerCase().includes(ql) || String(p.year||'').includes(ql)
  );
  if (!hits.length) {
    res.innerHTML = `<div class="sw-empty">Nuk u gjet asnjë pjesë për "${es(q)}"</div>`;
    res.classList.add('open'); return;
  }
  let html = `<div class="sw-res-hdr">${hits.length} rezultat${hits.length!==1?'e':''}</div>`;
  hits.slice(0,12).forEach(p => {
    const img = p.photo ? `<img src="${p.photo}" alt="">` : `<span style="font-size:1.2rem">⚙</span>`;
    const sub = [p.car, p.year].filter(Boolean).join(' · ');
    const qtyBadge = `<span style="font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;color:var(--wh4);margin-left:4px">${p.qty && parseInt(p.qty)>1 ? '· <span style="color:var(--wh2)">'+es(p.qty)+' copë</span>' : ''}</span>`;
    html += `<div class="sw-item" onclick="jumpTo('${p._id||''}','${es(q).replace(/'/g,"\\'")}')">
      <div class="sw-thumb">${img}</div>
      <div style="flex:1;min-width:0">
        <div class="sw-iname">${hi(p.name||'', q)}</div>
        <div class="sw-isub">${sub ? es(sub) : ''}${p.cond ? ' · '+es(p.cond) : ''}${p.qty ? ' · <strong>'+es(p.qty)+' copë</strong>' : ''}</div>
      </div>
      <div class="sw-iprice">${p.price ? '€'+parseFloat(p.price).toFixed(2) : '—'}</div>
    </div>`;
  });
  res.innerHTML = html; res.classList.add('open');
}
function jumpTo(id, q) { clrHS(); goParts(); document.getElementById('ppQ').value = q; filterP(q); }
function clrHS() {
  document.getElementById('sIn').value = '';
  document.getElementById('sRes').classList.remove('open');
  document.getElementById('sClr').style.display = 'none';
}
document.addEventListener('click', e => { if (!e.target.closest('.sw')) document.getElementById('sRes').classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeLB(); closeCF(); closeMo(); } });

// ══════════════════════════════════════
// RENDER PARTS
// ══════════════════════════════════════
function renderParts(filtered) {
  const g = document.getElementById('grid');
  const list = filtered !== undefined ? filtered : DB.parts;
  const cnt  = document.getElementById('ppCnt');
  cnt.innerHTML = filtered !== undefined
    ? `Gjetur <em>${list.length}</em> nga ${DB.parts.length}`
    : `Gjithsej <em>${DB.parts.length}</em> pjesë`;

  if (!list.length) {
    g.innerHTML = DB.parts.length === 0
      ? '<div class="empty"><div class="empty-ico">⚙</div><h3>Asnjë Pjesë</h3><p>Shto pjesën e parë</p></div>'
      : '<div class="empty"><div class="empty-ico">◌</div><h3>Asnjë Rezultat</h3><p>Provo me fjalë të tjera</p></div>';
    return;
  }

  g.innerHTML = '';
  list.forEach((p, li) => {
    const ri  = filtered !== undefined ? DB.parts.indexOf(p) : li;
    const c   = document.createElement('div'); c.className = 'pc';
    c.style.animationDelay = (li * 0.04) + 's';
    const col = condC(p.cond);

    const imgH = p.photo
      ? `<div class="pc-img zoomable" onclick="openLB('${p.photo}')"><img src="${p.photo}" alt="${es(p.name||'')}"><div class="zoom-hint">⊕ Zmadho</div></div>`
      : `<div class="pc-img"><span style="font-size:3rem;opacity:.08">⚙</span></div>`;

    const condH = p.cond
      ? `<div class="pc-badge" style="color:${col};background:${col}1a;border:1px solid ${col}38">${es(p.cond)}</div>` : '';

    const carH  = (p.car||p.year)
      ? `<div class="pc-car">${es([p.car,p.year].filter(Boolean).join(' · '))}</div>` : '';

    // Prices row
    const priceH = p.price
      ? `<div class="pc-price">€ ${parseFloat(p.price).toFixed(2)}</div>` : '';
    const costH = p.cost
      ? `<div style="font-family:'DM Mono',monospace;font-size:.62rem;color:var(--wh4);margin-bottom:4px">Kosto: <span style="color:var(--wh3)">€ ${parseFloat(p.cost).toFixed(2)}</span></div>` : '';

    // Quantity
    const qtyH = `<div style="font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:1px;color:var(--wh3);margin-bottom:6px">Sasia: <span style="color:var(--wh)">${es(String(p.qty||'1'))} copë</span></div>`;

    // Location — red if missing
    const locH = p.loc
      ? `<div style="font-family:'DM Mono',monospace;font-size:.6rem;color:var(--wh4);margin-bottom:10px">📍 ${es(p.loc)}</div>`
      : `<div style="font-family:'Barlow Condensed',sans-serif;font-size:.66rem;font-weight:700;letter-spacing:1px;color:var(--red3);border:1px solid rgba(232,25,44,.3);background:rgba(232,25,44,.07);border-radius:6px;padding:3px 9px;display:inline-block;margin-bottom:10px">⚠ E pa përcaktuar</div>`;

    c.innerHTML = `${imgH}
    <div class="pc-body">
      ${condH}
      <div class="pc-name">${es(p.name||'—')}</div>
      ${carH}
      ${priceH}
      ${costH}
      ${qtyH}
      ${locH}
      <div class="pc-date">📅 ${fmtD(p.addedAt)}</div>
      <div class="pc-acts">
        <button class="btn-s" style="font-size:.74rem;padding:7px 11px" onclick="openEP(${ri})">✎ Ndrysho</button>
        <button class="btn-d" onclick="delP(${ri},'${p._id||''}')">✕ Fshi</button>
      </div>
    </div>`;
    g.appendChild(c);
  });
}

function filterP(q) {
  if (!q.trim()) { renderParts(); return; }
  const ql = q.toLowerCase();
  renderParts(DB.parts.filter(p =>
    p.name?.toLowerCase().includes(ql) || p.car?.toLowerCase().includes(ql) ||
    p.cond?.toLowerCase().includes(ql) || String(p.year||'').includes(ql)
  ));
}

// ══════════════════════════════════════
// CRUD
// ══════════════════════════════════════
function openAP() {
  editP = null; photo = null;
  document.getElementById('mPt').textContent = 'Shto Pjesë të Re';
  ['pCar','pYear','pName','pPrice','pCost','pLoc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pCond').value = '';
  document.getElementById('pQty').value = '1';
  document.getElementById('phPrev').style.display = 'none';
  document.getElementById('mP').classList.add('open');
}
function openEP(pi) {
  editP = pi; const p = DB.parts[pi];
  document.getElementById('mPt').textContent = 'Ndrysho Pjesën';
  document.getElementById('pCar').value   = p.car   || '';
  document.getElementById('pYear').value  = p.year  || '';
  document.getElementById('pName').value  = p.name  || '';
  document.getElementById('pCond').value  = p.cond  || '';
  document.getElementById('pPrice').value = p.price || '';
  document.getElementById('pCost').value  = p.cost  || '';
  document.getElementById('pQty').value   = p.qty   || '1';
  document.getElementById('pLoc').value   = p.loc   || '';
  photo = p.photo || null;
  const pv = document.getElementById('phPrev');
  if (p.photo) { pv.src = p.photo; pv.style.display = 'block'; } else pv.style.display = 'none';
  document.getElementById('mP').classList.add('open');
}
function loadImg(e) {
  const f = e.target.files[0]; if (!f) return;
  const fr = new FileReader();
  fr.onload = ev => {
    photo = ev.target.result;
    const pv = document.getElementById('phPrev'); pv.src = photo; pv.style.display = 'block';
  };
  fr.readAsDataURL(f);
}
function saveP() {
  const n = document.getElementById('pName').value.trim();
  if (!n) { notif('Shkruaj emrin e pjesës', 'er'); return; }
  const part = {
    car:     document.getElementById('pCar').value.trim(),
    year:    document.getElementById('pYear').value.trim(),
    name:    n,
    cond:    document.getElementById('pCond').value,
    price:   document.getElementById('pPrice').value,
    cost:    document.getElementById('pCost').value,
    qty:     document.getElementById('pQty').value || '1',
    loc:     document.getElementById('pLoc').value.trim(),
    photo:   photo,
    addedAt: editP !== null ? (DB.parts[editP].addedAt || new Date().toISOString()) : new Date().toISOString()
  };
  if (editP !== null) {
    fbUpdate(DB.parts[editP]._id, part);
    notif('✓ Pjesa u ndryshua');
  } else {
    fbPush(part);
    notif('✓ Pjesa u shtua');
  }
  closeMo();
  document.getElementById('ppQ').value = '';
}
function delP(pi, fbId) {
  cfCb = () => { fbRemove(fbId, pi); const q = document.getElementById('ppQ').value; q ? filterP(q) : renderParts(); notif('Pjesa u fshi', 'er'); };
  document.getElementById('cf').classList.add('open');
}

// LIGHTBOX
function openLB(src) { document.getElementById('lbImg').src = src; document.getElementById('lb').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLB()    { document.getElementById('lb').classList.remove('open'); document.body.style.overflow = ''; }

// CONFIRM
document.getElementById('cfY').onclick = () => { if (cfCb) cfCb(); closeCF(); };
function closeCF() { document.getElementById('cf').classList.remove('open'); cfCb = null; }

// MODAL & NOTIF
function closeMo() { document.getElementById('mP').classList.remove('open'); }
function notif(msg, t='ok') {
  const n = document.getElementById('notif');
  n.textContent = msg; n.className = 'notif ' + t + ' show';
  setTimeout(() => n.className = 'notif', 3200);
}

// INIT
renderParts(); updateStats();
document.getElementById('pwIn').focus();
</script>
</body>
</html>
