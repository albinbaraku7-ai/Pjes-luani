<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Pjes Luani</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">

import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDT_I6TZbfuBuZdDy2anb6PwoV4sqUspXo",
  authDomain: "autopjesluani-f31c6.firebaseapp.com",
  databaseURL: "https://autopjesluani-f31c6-default-rtdb.firebaseio.com",
  projectId: "autopjesluani-f31c6",
  storageBucket: "autopjesluani-f31c6.firebasestorage.app",

window._fb = { useFirebase, database, ref, push, set, onValue, remove, dbRef };

<style>
:root {
  --bg: #050505; --bg2: #0d0d0d; --bg3: #161616; --bg4: #202020;
  --red: #e8192c; --red2: #c0111f; --red3: #ff4d5e;
  --wh: #ffffff; --wh2: #e0e0e0; --wh3: #a0a0a0; --wh4: #555555;
  --gl: rgba(255,255,255,0.05); --gl2: rgba(255,255,255,0.09);
  --bd: rgba(255,255,255,0.12); --bd2: rgba(255,255,255,0.24);
  --bdr: rgba(232,25,44,0.3); --bdr2: rgba(232,25,44,0.6);
  --sh: rgba(0,0,0,0.85);
}

*,*::before,*::after {margin:0;padding:0;box-sizing:border-box;}
html,body {height:100%; background:var(--bg); color:var(--wh); font-family:'Barlow',sans-serif; overflow-x:hidden;}

.ag {position:fixed; pointer-events:none; z-index:0; border-radius:50%; filter:blur(140px);}
.ag1 {width:700px;height:700px;background:var(--red);top:-280px;right:-280px;opacity:.08;}
.ag2 {width:500px;height:500px;background:#fff;bottom:-200px;left:-200px;opacity:.02;}

#LP {position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .8s;}
.lp-wrap {text-align:center;width:100%;max-width:400px;padding:20px;}
.lp-card {background:var(--gl);backdrop-filter:blur(40px);border:1px solid var(--bd2);border-radius:20px;padding:42px 36px;box-shadow:0 40px 80px var(--sh);}
.lp-btn {width:100%;padding:15px;background:var(--red);border:none;border-radius:10px;color:#fff;font-weight:800;letter-spacing:5px;text-transform:uppercase;cursor:pointer;}
.lp-err {margin-top:12px;padding:11px 14px;background:rgba(232,25,44,.12);border:1px solid var(--bdr);border-radius:8px;color:var(--red3);display:none;}
.lp-err.show {display:block;}

#APP {display:none;min-height:100vh;position:relative;z-index:1;}
.sync-bar {text-align:center;padding:9px 20px;background:rgba(232,25,44,.06);border-bottom:1px solid var(--bdr);font-size:.68rem;font-weight:600;letter-spacing:3px;color:var(--wh4);text-transform:uppercase;}
.sync-bar.live {background:rgba(255,255,255,.03);}

.hdr {position:sticky;top:0;z-index:600;height:66px;background:rgba(5,5,5,.9);backdrop-filter:blur(32px);border-bottom:1px solid var(--bd);padding:0 28px;display:flex;align-items:center;justify-content:space-between;}
.nbtn {padding:8px 15px;border-radius:8px;background:transparent;color:var(--wh3);cursor:pointer;}
.nbtn.on {background:rgba(232,25,44,.12);color:var(--red3);}

.pg {display:none;animation:fade .3s;}
.pg.on {display:block;}
@keyframes fade {from{opacity:0} to{opacity:1}}

.hero {padding:90px 28px 68px;text-align:center;}
.hero-h1 {font-family:'Barlow Condensed',sans-serif;font-size:clamp(3.5rem,8vw,6.5rem);font-weight:800;letter-spacing:5px;text-transform:uppercase;}
.hero-h1 em {color:var(--red);}

.grid {padding:20px 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}

.pc {background:var(--gl);border:1px solid var(--bd);border-radius:16px;overflow:hidden;transition:all .3s;}
.pc:hover {transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.7);}

.mo {position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;}
.mo.open {display:flex;}
.mo-box {background:#111;border:1px solid var(--bd2);border-radius:16px;padding:25px;width:90%;max-width:460px;max-height:92vh;overflow-y:auto;}
</style>
</head>
<body>

<div class="ag ag1"></div>
<div class="ag ag2"></div>

<!-- LOGIN -->
<div id="LP">
  <div class="lp-wrap">
    <div class="lp-logo" style="margin-bottom:30px;">
      <div class="lp-name" style="font-size:2.4rem;">AUTO PJES <em>LUANI</em></div>
    </div>
    <div class="lp-card">
      <div class="lp-ctitle" style="margin-bottom:8px;">Hyrje e Sigurt</div>
      <input type="password" id="pwIn" placeholder="Shkruaj fjalëkalimin" style="width:100%;padding:14px;background:#222;border:1px solid #444;border-radius:10px;color:white;font-size:1rem;margin-bottom:15px;" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="lp-btn" onclick="doLogin()">HYR NË SISTEM</button>
      <div class="lp-err" id="lpErr">Fjalëkalimi është i gabuar</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="APP">
  <div class="sync-bar" id="syncBar"><em>⬤</em> Duke u lidhur...</div>

  <header class="hdr">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="hdr-title">AUTO PJES <em>LUANI</em></div>
    </div>
    <div>
      <button class="nbtn on" onclick="showPg('home',this)">Ballina</button>
      <button class="nbtn" onclick="showPg('parts',this)">Pjesët</button>
      <button onclick="doLogout()" style="background:var(--red);color:white;border:none;padding:8px 16px;border-radius:8px;">Dil</button>
    </div>
  </header>

  <!-- HOME -->
  <div class="pg on" id="pgHome">
    <div class="hero">
      <div class="hero-h1">AUTO PJES <em>LUANI</em></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- PARTS -->
  <div class="pg" id="pgParts">
    <div style="padding:25px;font-size:1.5rem;font-weight:700;text-align:center;">Lista e Pjesëve</div>
    <div class="grid" id="gridParts"></div>
  </div>
</div>

<script>
// ==================== DATA & FUNCTIONS ====================
let DB = JSON.parse(localStorage.getItem('apl_wr2') || '{"parts":[],"pw":"luani123"}');

function saveLoc() { localStorage.setItem('apl_wr2', JSON.stringify(DB)); }

function renderParts(container = 'grid') {
  const g = document.getElementById(container);
  g.innerHTML = '';
  
  if (DB.parts.length === 0) {
    g.innerHTML = `<div style="grid-column:1/-1;padding:80px 20px;text-align:center;color:#777;">Asnjë pjesë. Shto të parën!</div>`;
    return;
  }

  DB.parts.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pc';
    card.innerHTML = `
      <div style="padding:16px;">
        <div style="font-weight:700;font-size:1.2rem;">${p.name || 'Pa emër'}</div>
        <div style="color:#aaa;margin:6px 0;">${p.car || ''} ${p.year || ''}</div>
        <div style="color:var(--red);font-size:1.4rem;font-weight:700;">€ ${Number(p.price||0).toFixed(2)}</div>
      </div>
    `;
    g.appendChild(card);
  });
}

// Navigation
function showPg(page, btn) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.getElementById('pg' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('on');
  if (btn) {
    document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  }
  if (page === 'parts') renderParts('gridParts');
}

// Login
function doLogin() {
  const pwInput = document.getElementById('pwIn');
  if (pwInput.value === DB.pw) {
    document.getElementById('LP').style.display = 'none';
    document.getElementById('APP').style.display = 'block';
    renderParts('grid');
  } else {
    const err = document.getElementById('lpErr');
    err.classList.add('show');
    pwInput.value = '';
    setTimeout(() => err.classList.remove('show'), 2800);
  }
}

function doLogout() {
  document.getElementById('APP').style.display = 'none';
  document.getElementById('LP').style.display = 'flex';
  document.getElementById('pwIn').value = '';
}

// Init
document.getElementById('pwIn').focus();
</script>
</body>
</html>
