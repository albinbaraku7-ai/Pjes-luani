<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Pjes Luani</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCURAn1kdrdt_O43STZeiamXKdpNtIX_yc",
  authDomain: "autopjesluani.firebaseapp.com",
  databaseURL: "https://autopjesluani-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "autopjesluani",
  storageBucket: "autopjesluani.firebasestorage.app",
  messagingSenderId: "669643033219",
  appId: "1:669643033219:web:5928dad21a9608ebdf29b6",
  measurementId: "G-T313JFLMNX"
};

let app, database, dbRef;
let useFirebase = false;

try {
  app = initializeApp(firebaseConfig);
  database = getDatabase(app);
  dbRef = ref(database, 'autopjes/parts');
  useFirebase = true;
} catch(e) {
  console.log('Firebase not configured');
}

window._firebase = { useFirebase, database, ref, push, set, onValue, remove, update, dbRef };
</script>

<style>
:root {
  --bg:      #050505;
  --bg2:     #0a0a0a;
  --bg3:     #111111;
  --gold:    #D4AF37;
  --gold2:   #b8962e;
  --gold3:   #f0d060;
  --gold-dim:#D4AF3722;
  --ruby:    #8B0000;
  --ruby2:   #6b0000;
  --ruby3:   #c0392b;
  --glass:   rgba(255,255,255,0.04);
  --glass2:  rgba(255,255,255,0.07);
  --border:  rgba(212,175,55,0.18);
  --border2: rgba(212,175,55,0.32);
  --text:    #e8e0d0;
  --text2:   #9a9080;
  --text3:   #5a5248;
  --shadow:  rgba(0,0,0,0.8);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Montserrat',sans-serif; overflow-x:hidden; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--gold2); border-radius:2px; }

body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
}

.amb-glow { position:fixed; pointer-events:none; z-index:0; border-radius:50%; filter:blur(120px); opacity:.12; }
.amb-1 { width:600px; height:600px; background:var(--gold); top:-200px; right:-200px; }
.amb-2 { width:500px; height:500px; background:var(--ruby); bottom:-150px; left:-150px; }

/* LOGIN */
#LP { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:var(--bg); transition:opacity .8s; }
.lp-logo-wrap { text-align:center; margin-bottom:36px; }
.lp-emblem { width:72px; height:72px; margin:0 auto 16px; border-radius:50%; background:linear-gradient(135deg, var(--gold), var(--gold2)); display:flex; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(212,175,55,.3); }
.lp-brand { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600; letter-spacing:4px; color:var(--text); text-transform:uppercase; }
.lp-brand em { color:var(--gold); font-style:normal; }
.lp-card { width:380px; background:var(--glass); backdrop-filter:blur(40px); border:1px solid var(--border); border-radius:20px; padding:40px 36px; box-shadow:0 40px 80px var(--shadow); }
.fg { margin-bottom:16px; text-align:left; }
.fg label { display:block; font-size:.58rem; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:8px; font-family:'DM Mono',monospace; }
.fg input, .fg select { width:100%; padding:12px 16px; background:rgba(212,175,55,.04); border:1px solid var(--border); border-radius:10px; color:var(--text); outline:none; }
.lp-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--gold),var(--gold2)); border:none; border-radius:10px; color:#050505; font-weight:700; letter-spacing:4px; text-transform:uppercase; cursor:pointer; }
.lp-err { margin-top:12px; color:#ff6b6b; font-size:.76rem; display:none; font-family:'DM Mono',monospace; }

/* APP */
#APP { display:none; min-height:100vh; position:relative; z-index:1; }
.hdr { position:sticky; top:0; z-index:600; height:64px; background:rgba(5,5,5,.85); backdrop-filter:blur(32px); border-bottom:1px solid var(--border); padding:0 28px; display:flex; align-items:center; justify-content:between; }
.nbtn { padding:7px 14px; background:transparent; border:1px solid transparent; color:var(--text2); cursor:pointer; font-size:.72rem; }
.nbtn.on { color:var(--gold); border-color:var(--border2); }
.fb-notice { text-align:center; padding:8px; background:rgba(212,175,55,.06); border-bottom:1px solid var(--border); font-family:'DM Mono',monospace; font-size:.58rem; color:var(--text3); }

/* GRID */
.grid { padding:20px 28px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
.pc { background:var(--glass); border:1px solid var(--border); border-radius:16px; overflow:hidden; transition: .3s; }
.pc:hover { transform:translateY(-4px); border-color:var(--gold); }
.pc-img { width:100%; height:150px; background:#111; overflow:hidden; }
.pc-img img { width:100%; height:100%; object-fit:cover; }
.pc-body { padding:15px; }
.pc-name { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--text); }
.pc-price { color:var(--gold); font-size:1.3rem; margin:5px 0; }
.mo { position:fixed; inset:0; z-index:800; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; }
.mo.open { display:flex; }
.mo-box { background:#080808; border:1px solid var(--border); padding:30px; border-radius:20px; width:400px; max-height:90vh; overflow-y:auto; }

/* UTILS */
.notif { position:fixed; bottom:20px; right:20px; padding:15px; background:#111; border:1px solid var(--gold); border-radius:10px; transform:translateX(200%); transition:.4s; z-index:9999; }
.notif.show { transform:translateX(0); }
</style>
</head>
<body>

<div id="LP">
  <div style="text-align:center">
    <div class="lp-logo-wrap">
      <div class="lp-brand">Auto Pjes <em>Luani</em></div>
    </div>
    <div class="lp-card">
      <div class="fg">
        <label>Fjalëkalimi</label>
        <input type="password" id="pwIn" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="lp-btn" onclick="doLogin()">Hyr</button>
      <div class="lp-err" id="lpErr">Gabim!</div>
    </div>
  </div>
</div>

<div id="APP">
  <div class="fb-notice" id="fbNotice">⬤ Serveri Aktiv</div>
  <header class="hdr" style="justify-content: space-between;">
    <div style="font-weight:bold; letter-spacing:2px;">LUANI</div>
    <nav>
      <button class="nbtn on" onclick="showPg('home')">Ballina</button>
      <button class="nbtn" onclick="showPg('parts')">Pjesët</button>
      <button class="nbtn" onclick="doLogout()">Dil</button>
    </nav>
  </header>

  <div id="pgHome" class="pg on" style="padding:40px; text-align:center;">
    <h1 style="font-family:'Cormorant Garamond'; font-size:3rem; color:var(--gold);">Mirësevini</h1>
    <button class="lp-btn" style="width:200px; margin-top:20px;" onclick="openAP()">+ Shto Pjesë</button>
    <div id="stP" style="margin-top:20px; color:var(--text2);">0 Pjesë në total</div>
  </div>

  <div id="pgParts" class="pg" style="display:none;">
    <div class="grid" id="partsGrid"></div>
  </div>
</div>

<div class="mo" id="mP">
  <div class="mo-box">
    <h2 style="color:var(--gold); margin-bottom:20px;">Shto Pjesë</h2>
    <div class="fg"><label>Veturat</label><input type="text" id="pCar"></div>
    <div class="fg"><label>Emri Pjesës</label><input type="text" id="pName"></div>
    <div class="fg"><label>Çmimi €</label><input type="number" id="pPrice"></div>
    <div class="fg"><label>Foto</label><input type="file" accept="image/*" onchange="handleImg(event)"></div>
    <div style="display:flex; gap:10px;">
        <button class="lp-btn" onclick="saveP()">Ruaj</button>
        <button class="lp-btn" style="background:grey" onclick="closeMo()">Anulo</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
let DB = { parts: [], pw: "luani123" };
let curPhoto = null;

// FIREBASE INTEGRATION
function initFirebase() {
    const fb = window._firebase;
    if (fb && fb.useFirebase) {
        fb.onValue(fb.dbRef, snap => {
            const data = snap.val() || {};
            DB.parts = Object.entries(data).map(([id, val]) => ({ ...val, _id: id }));
            renderParts();
            document.getElementById('stP').textContent = DB.parts.length + " Pjesë në total";
        });
    }
}

async function handleImg(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    // Resize image to keep database small
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const max = 600;
            let w = img.width, h = img.height;
            if (w > h) { if (w > max) { h *= max/w; w = max; } }
            else { if (h > max) { w *= max/h; h = max; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            curPhoto = canvas.toDataURL('image/jpeg', 0.7);
        };
    };
    reader.readAsDataURL(file);
}

function renderParts() {
    const g = document.getElementById('partsGrid');
    g.innerHTML = DB.parts.map((p, i) => `
        <div class="pc">
            <div class="pc-img">${p.photo ? `<img src="${p.photo}">` : '⚙'}</div>
            <div class="pc-body">
                <div class="pc-name">${p.name}</div>
                <div style="font-size:0.7rem; color:grey;">${p.car || ''}</div>
                <div class="pc-price">€${p.price}</div>
                <button onclick="delP('${p._id}', ${i})" style="color:red; background:none; border:none; cursor:pointer;">Fshi</button>
            </div>
        </div>
    `).join('');
}

function saveP() {
    const name = document.getElementById('pName').value;
    if (!name) return;
    const part = {
        name,
        car: document.getElementById('pCar').value,
        price: document.getElementById('pPrice').value,
        photo: curPhoto,
        addedAt: new Date().toISOString()
    };
    
    const fb = window._firebase;
    if (fb && fb.useFirebase) {
        fb.set(fb.push(fb.dbRef), part);
    }
    closeMo();
    notif("U ruajt!");
}

function delP(id, index) {
    if(!confirm("A do ta fshish?")) return;
    const fb = window._firebase;
    if (fb && fb.useFirebase && id !== 'undefined') {
        fb.remove(fb.ref(fb.database, 'autopjes/parts/' + id));
    }
}

function doLogin() {
    if (document.getElementById('pwIn').value === DB.pw) {
        document.getElementById('LP').style.display = 'none';
        document.getElementById('APP').style.display = 'block';
        initFirebase();
    } else {
        document.getElementById('lpErr').style.display = 'block';
    }
}

function doLogout() { location.reload(); }
function showPg(id) {
    document.querySelectorAll('.pg').forEach(p => p.style.display = 'none');
    document.getElementById('pg' + id.charAt(0).toUpperCase() + id.slice(1)).style.display = 'block';
}
function openAP() { document.getElementById('mP').classList.add('open'); }
function closeMo() { document.getElementById('mP').classList.remove('open'); curPhoto=null; }
function notif(m) { 
    const n = document.getElementById('notif'); n.textContent = m; n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 2000);
}
</script>
</body>
</html>
