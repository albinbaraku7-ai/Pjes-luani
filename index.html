<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Pjes Luani - Blue Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-main: #f0f4f8; /* E bardhë në të kaltër shumë të lehtë */
  --bg-card: #ffffff; /* E bardhë e pastër */
  --primary: #0077ff; /* E kaltër kryesore */
  --primary-dark: #0055cc;
  --accent: #00d4ff; /* E kaltër e hapur */
  --text-main: #1a2b3c;
  --text-sub: #64748b;
  --border: #e2e8f0;
}

html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--bg-main);color:var(--text-main);overflow-x:hidden}

/* ── ANIMACIONET E REJA ── */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulseBlue {
  0% { box-shadow: 0 0 0 0 rgba(0, 119, 255, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(0, 119, 255, 0); }
  100% { box-shadow: 0 0 0 0 rgba(0, 119, 255, 0); }
}

/* ── LOGIN ── */
#LP{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg-main);transition:opacity .65s}
.lp-box{position:relative;z-index:2;width:400px;text-align:center;animation: slideIn 0.8s ease-out;}
.lp-name{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--text-main)}
.lp-name span{color:var(--primary)}
.lp-card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:40px;box-shadow:0 20px 40px rgba(0,0,0,0.05); margin-top:20px;}

.fg{margin-bottom:20px; text-align:left;}
.fg label{display:block;font-size:0.7rem;font-weight:700;color:var(--primary);text-transform:uppercase;margin-bottom:8px;}
.fg input{width:100%;padding:14px;background:#f8fafc;border:1px solid var(--border);border-radius:12px;outline:none;transition:0.3s;}
.fg input:focus{border-color:var(--primary); background:#fff; box-shadow: 0 0 0 4px rgba(0,119,255,0.1);}

.lp-btn{width:100%;padding:15px;background:linear-gradient(135deg, var(--primary), var(--primary-dark));border:none;border-radius:12px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:0.3s;box-shadow: 0 4px 15px rgba(0,119,255,0.3);}
.lp-btn:hover{transform:translateY(-2px); box-shadow: 0 8px 20px rgba(0,119,255,0.4);}

/* ── APP HEADER ── */
.hdr{position:sticky;top:0;z-index:600;height:70px;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 30px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text-main)}
.hdr-title span{color:var(--primary)}

.nbtn{padding:8px 16px;border-radius:10px;border:none;background:transparent;color:var(--text-sub);cursor:pointer;font-weight:600;transition:0.3s;}
.nbtn.on{background:rgba(0,119,255,0.1); color:var(--primary);}
.nbtn:hover:not(.on){background:rgba(0,119,255,0.05);}

/* ── HOME HERO ── */
.hero-h1{font-family:'Rajdhani',sans-serif;font-size:4rem;color:var(--text-main);text-align:center;padding:60px 20px; animation: float 4s ease-in-out infinite;}
.hero-h1 em{color:var(--primary); font-style:normal;}

/* SEARCH */
.sw{max-width:600px; margin: 0 auto; position:relative;}
.s-in{width:100%; padding:18px 25px; border-radius:50px; border:1px solid var(--border); background:var(--bg-card); box-shadow: 0 10px 30px rgba(0,0,0,0.05); outline:none; font-size:1rem; transition:0.3s;}
.s-in:focus{border-color:var(--primary); box-shadow: 0 10px 30px rgba(0,119,255,0.15);}

/* CARDS */
.grid{padding:40px; display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:25px;}
.pc{background:var(--bg-card); border-radius:20px; overflow:hidden; border:1px solid var(--border); transition:0.3s; cursor:pointer;}
.pc:hover{transform:translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-color:var(--primary);}
.pc-img{height:180px; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-size:3rem;}
.pc-img img{width:100%; height:100%; object-fit:cover;}
.pc-body{padding:20px;}
.pc-name{font-weight:700; font-size:1.1rem; margin-bottom:5px;}
.pc-price{color:var(--primary); font-family:'Rajdhani'; font-weight:700; font-size:1.3rem;}

/* BUTTONS */
.qadd-btn{margin-top:20px; padding:12px 30px; border-radius:50px; border:none; background:var(--primary); color:#fff; font-weight:700; cursor:pointer; animation: pulseBlue 2s infinite;}

.pg{display:none;} .pg.on{display:block;}
</style>
</head>
<body>

<div id="LP">
  <div class="lp-box">
    <div class="lp-name">AUTO PJES <span>LUANI</span></div>
    <div class="lp-card">
      <div class="fg"><label>Fjalëkalimi i Sistemit</label><input type="password" id="pwIn" placeholder="Shkruaj fjalëkalimin..." onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="lp-btn" onclick="doLogin()">HYR NË PANEL</button>
      <p id="lpErr" style="color:red; font-size:0.8rem; margin-top:10px; display:none;">Fjalëkalim i gabuar!</p>
    </div>
  </div>
</div>

<div id="APP" style="display:none;">
  <header class="hdr">
    <div class="hdr-title">AUTO PJES <span>LUANI</span></div>
    <nav>
      <button class="nbtn on" onclick="showPg('home',this)">Ballina</button>
      <button class="nbtn" onclick="showPg('parts',this)">Inventari</button>
      <button class="nbtn" style="color:#ff4444;" onclick="location.reload()">Dil</button>
    </nav>
  </header>

  <div class="pg on" id="pgHome">
    <div class="hero-h1">AUTO PJES <em>LUANI</em></div>
    <div class="sw">
      <input type="text" class="s-in" placeholder="Kërko për pjesë (p.sh. Far, Branik...)" oninput="filterParts(this.value)">
    </div>
    <div style="text-align:center;">
      <button class="qadd-btn" onclick="showPg('parts')">Shiko Gjithë Pjesët</button>
    </div>
  </div>

  <div class="pg" id="pgParts">
    <div class="grid" id="partsGrid">
        </div>
  </div>
</div>

<script>
// Fjalëkalimi mbetet i njëjtë: luani123
let DB = JSON.parse(localStorage.getItem('apl_v7') || '{"parts":[],"pw":"luani123"}');

function doLogin() {
  const v = document.getElementById('pwIn').value;
  if (v === DB.pw) {
    document.getElementById('LP').style.display='none';
    document.getElementById('APP').style.display='block';
    renderParts();
  } else {
    document.getElementById('lpErr').style.display='block';
  }
}

function showPg(name, btn) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('pg' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('on');
  if(btn) btn.classList.add('on');
}

function renderParts(filtered) {
  const g = document.getElementById('partsGrid');
  const list = filtered || DB.parts;
  g.innerHTML = list.length ? '' : '<p style="text-align:center; width:100%; color:#64748b;">Nuk ka pjesë në inventar.</p>';
  list.forEach((p, i) => {
    const d = document.createElement('div'); d.className = 'pc';
    d.innerHTML = `
      <div class="pc-img">${p.photo ? '<img src="'+p.photo+'">' : '⚙️'}</div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div style="font-size:0.8rem; color:#64748b; margin-bottom:10px;">${p.car}</div>
        <div class="pc-price">€${p.price}</div>
      </div>`;
    g.appendChild(d);
  });
}

function filterParts(q) {
    const f = DB.parts.filter(p => p.name.toLowerCase().includes(q.toLowerCase()) || p.car.toLowerCase().includes(q.toLowerCase()));
    renderParts(f);
}
</script>

</body>
</html>
