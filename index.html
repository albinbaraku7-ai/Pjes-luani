<!-- ================= APP SCRIPT ================= -->
<script>
// STATE
let DB = JSON.parse(localStorage.getItem('apl_wr2') || '{"parts":[],"pw":"luani123"}');
if (!DB.parts) DB.parts = [];
if (!DB.pw) DB.pw = "luani123";

let editP = null;
let photo = null;

const es = s => String(s).replace(/[&<>"']/g,c=>({
 '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));

// ================= IMAGE LOAD (FIX) =================
function loadImg(e){
  const f = e.target.files[0];
  if(!f) return;

  // 🔥 LIMIT i ri (KY ËSHTË FIX KRYESOR)
  if(f.size > 3 * 1024 * 1024){
    alert("Foto është shumë e madhe! Maksimum 3MB.");
    return;
  }

  const fr = new FileReader();
  fr.onload = ev=>{
    photo = ev.target.result;
    const pv = document.getElementById('phPrev');
    pv.src = photo;
    pv.style.display = 'block';
  };
  fr.readAsDataURL(f);
}

// ================= RENDER FIX (lazy loading) =================
function renderParts(){
  const g = document.getElementById('grid');
  g.innerHTML = "";

  DB.parts.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className = "pc";

    div.innerHTML = `
      <div class="pc-img">
        ${p.photo ? `<img loading="lazy" src="${p.photo}">` : "⚙"}
      </div>
      <div class="pc-body">
        <div class="pc-name">${es(p.name||"")}</div>
        <div class="pc-price">€${p.price||0}</div>
      </div>
    `;
    g.appendChild(div);
  });
}

// ================= SEARCH / INIT =================
renderParts();
</script>

</body>
