<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Luxury</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #b30000, #ff1a1a);
    padding: 25px;
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 40px;
    text-align: center;
}

/* TITLE */
h1 {
    font-size: 42px;
    font-weight: 900;
    color: #ff1a1a;
}

p {
    font-size: 18px;
    font-weight: 600;
    color: #f2f2f2;
}

/* BUTTON */
.btn {
    background: #ff1a1a;
    color: white;
    padding: 15px 30px;
    border: none;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: #ff1a1a;
}

/* LOGIN BOX */
.login-box {
    margin-top: 50px;
    background: #1a1a1a;
    padding: 30px;
    border-radius: 15px;
    display: inline-block;
    box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

input {
    padding: 12px;
    width: 250px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    font-weight: bold;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<header>
    WEB LUXURY DESIGN
</header>

<div class="container">

    <h1>Mirë se erdhe</h1>
    <p>Dizajn modern me stil profesional kuq & bardhë</p>

    <button class="btn" onclick="showLogin()">Hyr në sistem</button>

    <div id="login" class="login-box hidden">
        <h2 style="color:#ff1a1a;">Login</h2>
        <input type="text" id="user" placeholder="Username"><br>
        <input type="password" id="pass" placeholder="Password"><br>
        <button class="btn" onclick="login()">Hyr</button>
        <p id="msg"></p>
    </div>

</div>

<script>
function showLogin(){
    document.getElementById("login").classList.toggle("hidden");
}

function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "admin" && pass === "1234"){
        document.getElementById("msg").innerHTML = "✔ U kyqe me sukses!";
        document.getElementById("msg").style.color = "lime";
    } else {
        document.getElementById("msg").innerHTML = "✖ Gabim passwordi";
        document.getElementById("msg").style.color = "red";
    }
}
</script>

</body>
</html>
