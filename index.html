<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luani Auto Pjes</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #1a1a1a, #000);
    color: white;
}

/* LOGIN */
#loginPage {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 35px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(255,0,0,0.3);
}

input {
    padding: 12px;
    width: 250px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-weight: bold;
}

.btn {
    background: #ff1a1a;
    color: white;
    padding: 12px 30px;
    border: none;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 15px;
}

.btn:hover {
    background: white;
    color: #ff1a1a;
}

/* DASHBOARD */
#dashboard {
    display: none;
}

header {
    background: linear-gradient(90deg, #8b0000, #ff1a1a);
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: 900;
}

.container {
    text-align: center;
    padding: 40px;
}

/* SETTINGS */
.settings {
    margin-top: 40px;
    background: rgba(255,255,255,0.05);
    display: inline-block;
    padding: 25px;
    border-radius: 15px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="box">
        <h2>Shkruaj Password</h2>
        <input type="password" id="passInput" placeholder="Password"><br>
        <button class="btn" onclick="login()">HYR</button>
        <p id="msg"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<header>LUANI AUTO PJES</header>

<div class="container">

    <h1>Mirë se erdhe</h1>

    <div class="settings">
        <h3>Settings - Ndrysho Password</h3>
        <input type="password" id="newPass" placeholder="New password"><br>
        <button class="btn" onclick="changePass()">Ruaj</button>
        <p id="status"></p>
    </div>

</div>

</div>

<script>

// default password
if(localStorage.getItem("pass") === null){
    localStorage.setItem("pass", "1234");
}

function login(){
    let input = document.getElementById("passInput").value;
    let saved = localStorage.getItem("pass");

    if(input === saved){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    } else {
        document.getElementById("msg").innerHTML = "✖ Password gabim";
        document.getElementById("msg").style.color = "red";
    }
}

function changePass(){
    let np = document.getElementById("newPass").value;

    if(np.length < 3){
        alert("Password shumë i shkurtër!");
        return;
    }

    localStorage.setItem("pass", np);
    document.getElementById("status").innerHTML = "✔ Password u ndryshua!";
    document.getElementById("status").style.color = "lime";
}
</script>

</body>
</html>
