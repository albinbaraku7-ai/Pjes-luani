<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDT_I6TZbfuBuZdDy2anb6PwoV4sqUspXo",

  databaseURL: "https://autopjesluani-f31c6-default-rtdb.firebaseio.com",

<style>
:root {
  --bg: #050505; --bg2: #0d0d0d; --bg3: #161616; --bg4: #202020;
  --red: #e8192c; --red2: #c0111f; --red3: #ff4d5e;
  --wh: #ffffff; --wh2: #e0e0e0; --wh3: #a0a0a0; --wh4: #555555;
  --gl: rgba(255,255,255,0.05); --gl2: rgba(255,255,255,0.09);
  --bd: rgba(255,255,255,0.12); --bd2: rgba(255,255,255,0.24);
  --bdr: rgba(232,25,44,0.3); --bdr2: rgba(232,25,44,0.6);
  --sh: rgba(0,0,0,0.85);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--wh); font-family:'Barlow',sans-serif; overflow-x:hidden; }

.ag { position:fixed; pointer-events:none; z-index:0; border-radius:50%; filter:blur(140px); }
.ag1 { width:700px; height:700px; background:var(--red); top:-280px; right:-280px; opacity:.08; }
.ag2 { width:500px; height:500px; background:#fff; bottom:-200px; left:-200px; opacity:.02; }

#LP { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:var(--bg); }
.lp-card { background:var(--gl); backdrop-filter:blur(40px); border:1px solid var(--bd2); border-radius:20px; padding:42px 36px; }

#APP { display:none; min-height:100vh; position:relative; z-index:1; }
.sync-bar { text-align:center; padding:9px 20px; background:rgba(232,25,44,.06); border-bottom:1px solid var(--bdr); font-size:.68rem; font-weight:600; letter-spacing:3px; color:var(--wh4); text-transform:uppercase; }
.sync-bar.live { background:rgba(255,255,255,.03); }

.hdr { position:sticky; top:0; z-index:600; background:rgba(5,5,5,.95); backdrop-filter:blur(32px); border-bottom:1px solid var(--bd); padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:66px; }

.pg { display:none; }
.pg.on { display:block; }

.hero { padding:80px 20px 40px; text-align:center; }
.hero-h1 { font-family:'Barlow Condensed',sans-serif; font-size:3.5rem; font-weight:800; letter-spacing:4px; text-transform:uppercase; }
.hero-h1 em { color:var(--red); }

.grid { padding:20px; display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:16px; }

.pc { background:var(--gl); border:1px solid var(--bd); border-radius:16px; padding:16px; transition:all .3s; }
.pc:hover { transform:translateY(-6px); box-shadow:0 15px 30px rgba(0,0,0,0.6); }

.mo { position:fixed; inset:0; z-index:800; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; }
.mo.open { display:flex; }
.mo-box { background:#111; border:1px solid var(--bd2); border-radius:16px; padding:25px; width:90%; max-width:460px; max-height:90vh; overflow-y:auto; }

.notif { position:fixed; bottom:20px; right:20px; background:#111; border:1px solid var(--red); padding:12px 20px; border-radius:8px; z-index:9999; transform:translateX(150%); transition:.4s; }
.notif.show { transform:translateX(0); }
</style>
</head>
<body>

<div class="ag ag1"></div>
<div class="ag ag2"></div>

<!-- LOGIN -->
<div id="LP">
  <div class="lp-card" style="max-width:380px; width:90%;">
    <div style="text-align:center; margin-bottom:25px;">
      <div style="font-size:2.8rem; font-weight:800; letter-spacing:6px;">AUTO PJES <span style="color:#e8192c;">LUANI</span></div>
    </div>
    <input type="password" id="pwIn" placeholder="Fjalëkalimi" style="width:100%; padding:14px; background:#222; border:1px solid #444; border-radius:8px; color:white; font-size:1rem;" onkeydown="if(event.key==='Enter') doLogin()">
    <button onclick="doLogin()" style="width:100%; margin-top:15px; padding:14px; background:#e8192c; border:none; border-radius:8px; color:white; font-weight:700; font-size:1.1rem;">HYR</button>
    <div id="lpErr" style="color:#ff4d5e; text-align:center; margin-top:12px; display:none;">Fjalëkalimi i gabuar</div>
  </div>
</div>

<!-- APP -->
<div id="APP">
  <div class="sync-bar" id="syncBar"><em>⬤</em> Duke u lidhur me serverin...</div>

  <header class="hdr">
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="font-size:1.4rem; font-weight:800; letter-spacing:3px;">AUTO PJES <span style="color:#e8192c;">LUANI</span></div>
    </div>
    <div style="display:flex; gap:8px;">
      <button onclick="showPg('home')" style="padding:8px 16px; background:rgba(255,255,255,0.1); border:none; border-radius:8px; color:white;">Ballina</button>
      <button onclick="showPg('parts')" style="padding:8px 16px; background:rgba(255,255,255,0.1); border:none; border-radius:8px; color:white;">Pjesët</button>
      <button onclick="doLogout()" style="padding:8px 16px; background:#e8192c; border:none; border-radius:8px; color:white;">Dil</button>
    </div>
  </header>

  <!-- HOME -->
  <div class="pg on" id="pgHome">
    <div class="hero">
      <div class="hero-h1">AUTO PJES <em>LUANI</em></div>
      <p style="margin-top:20px; color:var(--wh3);">Sistemi i Menaxhimit të Pjesëve</p>
    </div>
    <div class="grid" id="gridHome"></div>
  </div>

  <!-- PARTS -->
  <div class="pg" id="pgParts">
    <div style="padding:20px; font-size:1.4rem; font-weight:700; text-align:center; border-bottom:1px solid #333;">Lista e Pjesëve</div>
    <div class="grid" id="gridParts"></div>
  </div>
</div>

<script>
// Data
let DB = JSON.parse(localStorage.getItem('apl_wr2') || '{"parts":[],"pw":"luani123"}');

function saveLoc() { localStorage.setItem('apl_wr2', JSON.stringify(DB)); }

// Render
function renderParts(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  if (DB.parts.length === 0) {
    container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:#666;">Asnjë pjesë ende. Shto pjesë të reja.</div>`;
    return;
  }

  DB.parts.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'pc';
    card.innerHTML = `
      <div style="font-weight:700; font-size:1.15rem;">${p.name || 'Pa emër'}</div>
      <div style="color:#aaa; margin:6px 0;">${p.car || ''} ${p.year || ''}</div>
      <div style="color:#
