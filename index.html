<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Pjes Luani</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #1a1a1a, #000);
}

.box{
  width:300px;
  background:#1c1c1c;
  padding:25px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,0,0,0.3);
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#ff1e1e;
  color:#fff;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#fff;
  color:#ff1e1e;
}

/* APP */
#app{
  display:none;
  padding:20px;
}

header{
  background:linear-gradient(90deg,#8b0000,#ff1a1a);
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:900;
}

.card{
  background:#1c1c1c;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #ff1e1e;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>FJALËKALIMI</h2>
    <input type="password" id="pass" placeholder="Shkruaj password">
    <button onclick="login()">HYR</button>
    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>LUANI AUTO PJES</header>

<div style="padding:20px;">
  <h2>Mirë se erdhe 👋</h2>
  <p>Sistemi është aktiv</p>

  <div class="card">
    🔧 Këtu mund të shtosh më vonë pjesët e makinave
  </div>
</div>

</div>

<script>

function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "1234"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("msg").innerText = "❌ Password gabim";
    document.getElementById("msg").style.color = "red";
  }
}

</script>

</body>
</html>
