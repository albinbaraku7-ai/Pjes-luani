<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Pjes Luani</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bl:#04060d;
  --dk:#0d1222;
  --ac:#e63946;
  --ac2:#c1121f;
  --sl:#94a3b8;
  --wh:#e8edf5;
}

body{
  font-family:'Barlow',sans-serif;
  background:var(--bl);
  color:var(--wh);
}

/* LOGIN */
#LP{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bl);
}

.box{
  background:var(--dk);
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
  border:1px solid rgba(230,57,70,.3);
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#000;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:var(--ac);
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* APP */
#APP{display:none;padding:20px}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:var(--dk);
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(230,57,70,.2);
}

.price{
  color:var(--ac);
  font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="LP">
  <div class="box">
    <h2>HYRJE</h2>
    <input type="password" id="pw" placeholder="Fjalëkalimi">
    <button onclick="login()">HYR</button>
    <p id="err" style="color:red;margin-top:10px;display:none;">Gabim!</p>
  </div>
</div>

<!-- APP -->
<div id="APP">

<div class="header">
  <h2>Auto Pjes Luani</h2>
  <button onclick="logout()">Dil</button>
</div>

<input type="text" placeholder="Kërko..." oninput="search(this.value)">

<br><br>

<button onclick="addPart()">+ Shto Pjesë</button>

<br><br>

<div class="grid" id="grid"></div>

</div>

<script>

// DATABASE (localStorage)
let DB = JSON.parse(localStorage.getItem("apl") || '{"pw":"1234","parts":[]}');

function save(){
  localStorage.setItem("apl", JSON.stringify(DB));
}

// LOGIN
function login(){
  const v = document.getElementById("pw").value;

  if(v === DB.pw){
    document.getElementById("LP").style.display="none";
    document.getElementById("APP").style.display="block";
    render();
  }else{
    document.getElementById("err").style.display="block";
  }
}

function logout(){
  location.reload();
}

// ADD
function addPart(){
  const name = prompt("Emri i pjesës:");
  if(!name) return;

  const price = prompt("Çmimi:");

  DB.parts.push({
    name,
    price,
    date:new Date().toLocaleString()
  });

  save();
  render();
}

// RENDER
function render(list){
  const g = document.getElementById("grid");
  const data = list || DB.parts;

  g.innerHTML="";

  data.forEach((p,i)=>{
    g.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <div class="price">€ ${p.price || "-"}</div>
        <small>${p.date}</small>
        <br><br>
        <button onclick="del(${i})">Fshi</button>
      </div>
    `;
  });
}

// DELETE
function del(i){
  DB.parts.splice(i,1);
  save();
  render();
}

// SEARCH
function search(q){
  q=q.toLowerCase();

  const f = DB.parts.filter(p =>
    p.name.toLowerCase().includes(q)
  );

  render(f);
}

// INIT
if(localStorage.getItem("apl")){
  document.getElementById("LP").style.display="flex";
}

</script>

</body>
</html>
